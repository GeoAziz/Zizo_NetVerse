version: '3.9'

services:
  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: zizo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis-secure-password}
    networks:
      - zizo-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # InfluxDB Time Series Database
  influxdb:
    image: influxdb:2-alpine
    container_name: zizo-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: network-logs
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER:-admin}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-influx-secure-password}
      INFLUXDB_USER: ${INFLUXDB_USER:-zizo-user}
      INFLUXDB_USER_PASSWORD: ${INFLUXDB_USER_PASSWORD:-influx-user-password}
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - zizo-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zizo-backend
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      # API Configuration
      PROJECT_NAME: Zizo_NetVerse
      API_V1_STR: /api/v1
      # Database Config
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis-secure-password}@redis:6379
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-your-influxdb-token}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-zizo-netverse}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-network-logs}
      # Firebase Configuration
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # CORS Configuration
      BACKEND_CORS_ORIGINS: "http://localhost:3000,http://localhost:9002,http://frontend:3000"
      # Network Configuration
      NETWORK_INTERFACE: eth0
      CAPTURE_ENABLED: ${CAPTURE_ENABLED:-false}
    depends_on:
      redis:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    volumes:
      - ./src/backend:/app
      - /app/__pycache__
    networks:
      - zizo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zizo-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_V1: /api/v1
    depends_on:
      - backend
    networks:
      - zizo-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
    driver: local
  influxdb-data:
    driver: local

networks:
  zizo-network:
    driver: bridge
