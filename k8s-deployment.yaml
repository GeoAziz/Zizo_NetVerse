apiVersion: v1
kind: ConfigMap
metadata:
  name: zizo-config
  namespace: zizo-netverse
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "http://backend-service:8000"
  NEXT_PUBLIC_API_V1: "/api/v1"
  PROJECT_NAME: "Zizo_NetVerse"
  API_V1_STR: "/api/v1"
  INFLUXDB_ORG: "zizo-netverse"
  INFLUXDB_BUCKET: "network-logs"

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: zizo-netverse
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: zizo-netverse
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: zizo-netverse
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: influxdb-service
  namespace: zizo-netverse
spec:
  type: ClusterIP
  selector:
    app: influxdb
  ports:
    - protocol: TCP
      port: 8086
      targetPort: 8086

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: zizo-netverse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/zizo-netverse/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: zizo-config
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: zizo-netverse
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/zizo-netverse/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: zizo-config
          env:
            - name: REDIS_URL
              value: "redis://redis-service:6379"
            - name: INFLUXDB_URL
              value: "http://influxdb-service:8086"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: zizo-netverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: influxdb
  namespace: zizo-netverse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: influxdb
  template:
    metadata:
      labels:
        app: influxdb
    spec:
      containers:
        - name: influxdb
          image: influxdb:2-alpine
          ports:
            - containerPort: 8086
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
